name: Build MAUI App

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/AppAlarme/AppAlarme.csproj

      - name: Build project
        run: dotnet build src/AppAlarme/AppAlarme.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test tests/AppAlarme.Tests/AppAlarme.Tests.csproj --no-build --verbosity normal